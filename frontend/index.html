<script>
  // API base resolution:
  //  - explicit window.AIJOLOT_API_BASE wins (set before this script);
  //  - local dev serves the static frontend on :5500 (scripts/dev-frontend.py) while
  //    the FastAPI backend runs on :8000 → target :8000 on the same host;
  //  - production serves the frontend from the FastAPI container → same origin.
  window.AIJOLOT_API_BASE = window.AIJOLOT_API_BASE || (function () {
    var loc = window.location;
    var devPorts = { "5500": 1, "5173": 1, "8080": 1, "3000": 1 };
    if (devPorts[loc.port]) return loc.protocol + "//" + loc.hostname + ":8000";
    return loc.origin;
  })();
</script>
